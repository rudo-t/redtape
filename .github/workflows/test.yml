name: Test
on:
  push:
    branches: [ master ]
    tags:
      - "v*"
  pull_request:
    branches:
    - master

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install redtape with uv
        run: uv sync --group dev
      - name: Lint with ruff
        run: uv run --with ruff ruff check .
      - name: Check formatting with ruff
        run: uv run --with ruff ruff format --check .
      - name: Static type checking with mypy
        run: uv run --with mypy mypy redtape/
      - name: Dead-code check with vulture
        run: uv run --with vulture vulture redtape/ whitelist.py --min-confidence 80
      - name: Run unit tests with pytest
        run: uv run --with pytest pytest -v --cov=./redtape --cov-report=xml:./coverage.xml --cov-report term-missing tests/ --ignore=tests/integration
      - name: Upload code coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          name: redtape
          flags: unittests
          env_vars: OS,PYTHON
